<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员后台 - 数据统计</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* 登录页面 */
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
        }

        .login-title {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }

        .form-input {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .login-btn {
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .error-message {
            color: #ff4757;
            font-size: 14px;
            text-align: center;
            margin-top: 10px;
            display: none;
        }

        /* 管理后台 */
        .admin-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            display: none;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .admin-title {
            font-size: 28px;
            font-weight: bold;
            color: #333;
        }

        .logout-btn {
            padding: 10px 20px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #ff3838;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: bold;
        }

        .clicks-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        .click-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: white;
            border-radius: 10px;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .click-name {
            font-size: 16px;
            color: #333;
        }

        .click-count {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }

        .refresh-btn {
            width: 100%;
            padding: 15px;
            background: #00d2ff;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .refresh-btn:hover {
            background: #00b8e6;
        }

        .last-update {
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <!-- 登录页面 -->
    <div class="login-container" id="loginContainer">
        <h1 class="login-title">🔐 管理员登录</h1>
        <form class="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label class="form-label">账号</label>
                <input type="text" class="form-input" id="username" placeholder="请输入账号" required>
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" class="form-input" id="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="login-btn">登录</button>
            <div class="error-message" id="errorMessage">账号或密码错误！</div>
        </form>
    </div>

    <!-- 管理后台 -->
    <div class="admin-container" id="adminContainer">
        <div class="admin-header">
            <h1 class="admin-title">📊 数据统计后台</h1>
            <button class="logout-btn" onclick="handleLogout()">退出登录</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">📈 总访问量</div>
                <div class="stat-value" id="pageViews">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">🖱️ 总点击量</div>
                <div class="stat-value" id="totalClicks">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">📅 最后访问</div>
                <div class="stat-value" id="lastVisit" style="font-size: 16px;">-</div>
            </div>
        </div>

        <div class="clicks-section">
            <h2 class="section-title">按钮点击统计</h2>
            <div id="clicksList"></div>
        </div>

        <button class="refresh-btn" onclick="loadStats()">🔄 刷新数据</button>
        <div class="last-update" id="lastUpdate">最后更新：-</div>
    </div>

    <script>
        // 检查登录状态
        function checkAuth() {
            const isLoggedIn = sessionStorage.getItem('adminLoggedIn');
            if (isLoggedIn === 'true') {
                showAdmin();
                loadStats();
            }
        }

        // 处理登录
        function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (username === 'admin' && password === 'chen123456') {
                sessionStorage.setItem('adminLoggedIn', 'true');
                showAdmin();
                loadStats();
            } else {
                document.getElementById('errorMessage').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('errorMessage').style.display = 'none';
                }, 3000);
            }
        }

        // 显示管理后台
        function showAdmin() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('adminContainer').style.display = 'block';
        }

        // 退出登录
        function handleLogout() {
            sessionStorage.removeItem('adminLoggedIn');
            location.reload();
        }

        // 加载统计数据
        function loadStats() {
            const stats = JSON.parse(localStorage.getItem('siteStats') || '{"pageViews": 0, "buttonClicks": {}}');
            
            // 显示总访问量
            document.getElementById('pageViews').textContent = stats.pageViews || 0;

            // 计算总点击量
            let totalClicks = 0;
            for (let key in stats.buttonClicks) {
                totalClicks += stats.buttonClicks[key];
            }
            document.getElementById('totalClicks').textContent = totalClicks;

            // 显示最后访问时间
            if (stats.lastVisit) {
                const date = new Date(stats.lastVisit);
                document.getElementById('lastVisit').textContent = date.toLocaleString('zh-CN');
            }

            // 显示按钮点击详情
            const clicksList = document.getElementById('clicksList');
            clicksList.innerHTML = '';

            const buttonNames = {
                'contact_wechat': '💬 微信客服',
                'contact_whatsapp': '📱 WhatsApp客服',
                'contact_line': '💚 LINE客服',
                'calculate_return': '📊 计算收益'
            };

            for (let key in stats.buttonClicks) {
                const item = document.createElement('div');
                item.className = 'click-item';
                item.innerHTML = `
                    <span class="click-name">${buttonNames[key] || key}</span>
                    <span class="click-count">${stats.buttonClicks[key]}</span>
                `;
                clicksList.appendChild(item);
            }

            // 更新时间
            document.getElementById('lastUpdate').textContent = '最后更新：' + new Date().toLocaleString('zh-CN');
        }

        // 页面加载时检查登录状态
        checkAuth();
    </script>
</body>
</html>
