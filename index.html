<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>量化交易平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0a0e27;
            color: #fff;
            overflow-x: hidden;
            position: relative;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(100, 200, 255, 0.5);
            border-radius: 50%;
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            50% { opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 1;
            padding: 20px;
            max-width: 480px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 30px 0 20px;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        .subtitle {
            font-size: 14px;
            color: #8b9dc3;
        }

        .stats-card {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            border-radius: 20px;
            padding: 25px;
            margin: 20px 0;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0;
        }

        .stat-label {
            font-size: 14px;
            color: #8b9dc3;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }

        .stat-value.up {
            color: #00ff88;
            animation: pulse-up 1s ease-in-out infinite;
        }

        .stat-value.down {
            color: #ff4757;
            animation: pulse-down 1s ease-in-out infinite;
        }

        @keyframes pulse-up {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes pulse-down {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(0.95); }
        }

        .data-stream {
            height: 60px;
            overflow: hidden;
            margin: 20px 0;
            position: relative;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }

        .stream-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 15px;
            font-size: 12px;
            animation: stream 3s linear infinite;
            opacity: 0.7;
        }

        @keyframes stream {
            0% { transform: translateY(60px); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(-60px); opacity: 0; }
        }

        .calculator-card {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            border-radius: 20px;
            padding: 25px;
            margin: 20px 0;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .calculator-title {
            font-size: 20px;
            margin-bottom: 20px;
            text-align: center;
            color: #fff;
        }

        .input-group {
            margin: 20px 0;
        }

        .input-label {
            display: block;
            font-size: 14px;
            color: #8b9dc3;
            margin-bottom: 10px;
        }

        .input-field {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        .days-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .day-btn {
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #8b9dc3;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .day-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .day-btn:hover {
            border-color: #667eea;
        }

        .rate-display {
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            text-align: center;
        }

        #rateValue {
            font-size: 24px;
            font-weight: bold;
            color: #00ff88;
            margin-right: 10px;
        }

        .rate-note {
            font-size: 12px;
            color: #8b9dc3;
        }

        .cta-button {
            width: 100%;
            padding: 18px;
            margin: 20px 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
            animation: button-glow 2s ease-in-out infinite;
        }

        @keyframes button-glow {
            0%, 100% { box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4); }
            50% { box-shadow: 0 10px 40px rgba(102, 126, 234, 0.6); }
        }

        .cta-button:active {
            transform: scale(0.98);
        }

        .result-card {
            margin-top: 20px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-item.total {
            margin-top: 10px;
            padding-top: 15px;
            border-top: 2px solid rgba(255, 255, 255, 0.1);
        }

        .result-label {
            font-size: 14px;
            color: #8b9dc3;
        }

        .result-value {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
        }

        .result-value.profit {
            color: #00ff88;
        }

        .result-value.monthly-rate {
            color: #64b5f6;
        }

        .result-item.total .result-value {
            font-size: 24px;
            color: #ffd700;
        }

        .features {
            margin: 30px 0;
        }

        .feature-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border-left: 3px solid #667eea;
            animation: slide-in 0.5s ease-out forwards;
            opacity: 0;
        }

        .feature-item:nth-child(1) { animation-delay: 0.1s; }
        .feature-item:nth-child(2) { animation-delay: 0.2s; }
        .feature-item:nth-child(3) { animation-delay: 0.3s; }

        @keyframes slide-in {
            from {
                transform: translateX(-20px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .feature-icon {
            font-size: 24px;
            margin-right: 15px;
        }

        .feature-text {
            font-size: 14px;
            color: #dfe6e9;
        }

        /* 客服联系区域 */
        .contact-section {
            margin: 20px 0;
            padding: 25px 20px;
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.1) 0%, rgba(0, 200, 100, 0.1) 100%);
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 136, 0.2);
            text-align: center;
        }

        .contact-header {
            margin-bottom: 25px;
        }

        .contact-title {
            font-size: 16px;
            color: #8b9dc3;
            margin-bottom: 8px;
        }

        .contact-subtitle {
            font-size: 20px;
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        .contact-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .contact-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .contact-btn:active {
            transform: scale(0.98);
        }

        .contact-btn.wechat {
            background: linear-gradient(135deg, #07c160 0%, #05a850 100%);
        }

        .contact-btn.wechat:hover {
            box-shadow: 0 8px 20px rgba(7, 193, 96, 0.4);
        }

        .contact-btn.whatsapp {
            background: linear-gradient(135deg, #25D366 0%, #1DA851 100%);
        }

        .contact-btn.whatsapp:hover {
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.4);
        }

        .contact-btn.line {
            background: linear-gradient(135deg, #00B900 0%, #009900 100%);
        }

        .contact-btn.line:hover {
            box-shadow: 0 8px 20px rgba(0, 185, 0, 0.4);
        }

        .btn-icon {
            font-size: 24px;
        }

        .btn-text {
            font-size: 16px;
        }

        .wave {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            z-index: 0;
            opacity: 0.1;
        }

        .wave path {
            animation: wave 8s linear infinite;
        }

        @keyframes wave {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <svg class="wave" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320" preserveAspectRatio="none">
        <path fill="#667eea" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,112C672,96,768,96,864,112C960,128,1056,160,1152,160C1248,160,1344,128,1392,112L1440,96L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
    </svg>

    <div class="container">
        <div class="header">
            <div class="logo">⚡ 量化交易</div>
            <div class="subtitle">智能算法 · 稳定收益</div>
        </div>

        <!-- 客服联系区域 -->
        <div class="contact-section">
            <div class="contact-header">
                <p class="contact-title">点击下方按钮添加客服，领取</p>
                <p class="contact-subtitle">AI 量化交易免费体验名额</p>
            </div>

            <div class="contact-buttons">
                <button class="contact-btn wechat" onclick="contactService('wechat')">
                    <span class="btn-icon">💬</span>
                    <span class="btn-text">点击添加微信</span>
                </button>

                <button class="contact-btn whatsapp" onclick="contactService('whatsapp')">
                    <span class="btn-icon">📱</span>
                    <span class="btn-text">点击添加 WhatsApp</span>
                </button>

                <button class="contact-btn line" onclick="contactService('line')">
                    <span class="btn-icon">💚</span>
                    <span class="btn-text">点击添加 LINE</span>
                </button>
            </div>
        </div>

        <div class="stats-card">
            <div class="stat-item">
                <span class="stat-label">今日收益率</span>
                <span class="stat-value up" id="profit">+0.00%</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">累计收益</span>
                <span class="stat-value" id="total" style="color: #ffd700;">¥0.00</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">活跃策略</span>
                <span class="stat-value" id="strategies" style="color: #64b5f6;">0</span>
            </div>
        </div>

        <div class="data-stream" id="dataStream"></div>

        <!-- 复利计算器 -->
        <div class="calculator-card">
            <h3 class="calculator-title">💰 收益计算器</h3>
            
            <div class="input-group">
                <label class="input-label">投资金额 (美金或USDT) 起步$1000</label>
                <input type="number" id="investment" class="input-field" placeholder="请输入投资金额" value="10000">
            </div>

            <div class="input-group">
                <label class="input-label">投资天数</label>
                <div class="days-selector">
                    <button class="day-btn active" onclick="selectDays(30)">30天</button>
                    <button class="day-btn" onclick="selectDays(90)">90天</button>
                    <button class="day-btn" onclick="selectDays(180)">180天</button>
                    <button class="day-btn" onclick="selectDays(360)">360天</button>
                </div>
            </div>

            <div class="input-group">
                <label class="input-label">日收益率</label>
                <div class="rate-display">
                    <span id="rateValue">1.5%</span>
                    <span class="rate-note">(每日 1-2% 浮动)</span>
                </div>
            </div>

            <button class="cta-button" onclick="calculateReturn()">
                📊 计算收益
            </button>

            <div class="result-card" id="resultCard" style="display: none;">
                <div class="result-item">
                    <span class="result-label">投资本金</span>
                    <span class="result-value" id="principal">$0</span>
                </div>
                <div class="result-item">
                    <span class="result-label">月化率（预估）</span>
                    <span class="result-value monthly-rate" id="monthlyRate">0%</span>
                </div>
                <div class="result-item">
                    <span class="result-label">预期收益</span>
                    <span class="result-value profit" id="profitResult">$0</span>
                </div>
                <div class="result-item total">
                    <span class="result-label">总计金额</span>
                    <span class="result-value" id="totalResult">$0</span>
                </div>
            </div>
        </div>

        <div class="features">
            <div class="feature-item">
                <span class="feature-icon">🤖</span>
                <span class="feature-text">AI智能算法，24小时自动交易</span>
            </div>
            <div class="feature-item">
                <span class="feature-icon">📊</span>
                <span class="feature-text">实时数据分析，精准把握市场</span>
            </div>
            <div class="feature-item">
                <span class="feature-icon">🔒</span>
                <span class="feature-text">银行级安全保障，资金安全无忧</span>
            </div>
        </div>
    </div>

    <script>
        let selectedDays = 30;

        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 3 + 's';
                particle.style.animationDuration = (Math.random() * 2 + 2) + 's';
                container.appendChild(particle);
            }
        }

        function updateStats() {
            const profit = document.getElementById('profit');
            const total = document.getElementById('total');
            const strategies = document.getElementById('strategies');

            setInterval(() => {
                const profitValue = (Math.random() * 5 - 1).toFixed(2);
                profit.textContent = (profitValue >= 0 ? '+' : '') + profitValue + '%';
                profit.className = 'stat-value ' + (profitValue >= 0 ? 'up' : 'down');

                const totalValue = (Math.random() * 50000 + 10000).toFixed(2);
                total.textContent = '$' + totalValue.toLocaleString();

                const strategyCount = Math.floor(Math.random() * 5 + 3);
                strategies.textContent = strategyCount;
            }, 2000);
        }

        function createDataStream() {
            const stream = document.getElementById('dataStream');
            const symbols = ['BTC/USDT', 'ETH/USDT', 'BNB/USDT', 'SOL/USDT', 'ADA/USDT'];
            
            setInterval(() => {
                const item = document.createElement('div');
                item.className = 'stream-item';
                const symbol = symbols[Math.floor(Math.random() * symbols.length)];
                const price = (Math.random() * 10000 + 1000).toFixed(2);
                const change = (Math.random() * 10 - 5).toFixed(2);
                const color = change >= 0 ? '#00ff88' : '#ff4757';
                
                item.innerHTML = `
                    <span>${symbol}</span>
                    <span style="color: ${color}">${change >= 0 ? '+' : ''}${change}%</span>
                `;
                
                stream.appendChild(item);
                
                setTimeout(() => {
                    item.remove();
                }, 3000);
            }, 1000);
        }

        function selectDays(days) {
            selectedDays = days;
            document.querySelectorAll('.day-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        function contactService(type) {
            let message = '';
            switch(type) {
                case 'wechat':
                    message = '📱 请添加微信客服\n\n微信号：[请填写您的微信号]\n\n立即领取量化交易免费体验名额！';
                    break;
                case 'whatsapp':
                    message = '📱 请添加 WhatsApp 客服\n\n号码：[请填写您的WhatsApp号码]\n\n立即领取量化交易免费体验名额！';
                    break;
                case 'line':
                    message = '📱 请添加 LINE 客服\n\nLINE ID：[请填写您的LINE ID]\n\n立即领取量化交易免费体验名额！';
                    break;
            }
            alert(message);
        }

        function calculateReturn() {
            const investment = parseFloat(document.getElementById('investment').value);
            
            if (!investment || investment <= 0) {
                alert('请输入有效的投资金额！');
                return;
            }

            // 根据投资金额自动分配月化率
            // 每1000元增加月化率
            let monthlyRate = 10; // 基础月化率10%
            const thousands = Math.floor(investment / 1000);
            
            if (thousands >= 1 && thousands < 5) {
                monthlyRate = 10; // 1000-4999: 10%
            } else if (thousands >= 5 && thousands < 10) {
                monthlyRate = 12; // 5000-9999: 12%
            } else if (thousands >= 10 && thousands < 20) {
                monthlyRate = 15; // 10000-19999: 15%
            } else if (thousands >= 20 && thousands < 50) {
                monthlyRate = 18; // 20000-49999: 18%
            } else if (thousands >= 50 && thousands < 100) {
                monthlyRate = 20; // 50000-99999: 20%
            } else if (thousands >= 100) {
                monthlyRate = 25; // 100000+: 25%
            }

            // 根据月化率和投资天数计算预期收益
            // 预期收益 = 本金 × 月化率 × (天数/30)
            const profitAmount = investment * (monthlyRate / 100) * (selectedDays / 30);
            const finalAmount = investment + profitAmount;

            // 显示结果
            document.getElementById('principal').textContent = '$' + investment.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('monthlyRate').textContent = monthlyRate.toFixed(0) + '%';
            document.getElementById('profitResult').textContent = '$' + profitAmount.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('totalResult').textContent = '$' + finalAmount.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            
            // 更新显示的日收益率（根据月化率反推）
            const dailyRate = (monthlyRate / 100) / 30;
            document.getElementById('rateValue').textContent = (dailyRate * 100).toFixed(2) + '%';

            // 显示结果卡片
            const resultCard = document.getElementById('resultCard');
            resultCard.style.display = 'block';
        }

        createParticles();
        updateStats();
        createDataStream();
    </script>
</body>
</html>
