<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>黄金量化交易托管平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0a0e27;
            color: #fff;
            overflow-x: hidden;
            position: relative;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(100, 200, 255, 0.5);
            border-radius: 50%;
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            50% { opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 1;
            padding: 20px;
            max-width: 480px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 30px 0 20px;
            position: relative;
        }

        /* 黄金走势图 */
        .gold-chart-section {
            margin: 20px 0;
            padding: 25px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1) 0%, rgba(255, 193, 7, 0.1) 100%);
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .chart-title {
            font-size: 18px;
            font-weight: bold;
            color: #ffd700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chart-price {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
            font-family: 'Courier New', monospace;
        }

        .chart-change {
            font-size: 14px;
            margin-top: 5px;
        }

        .chart-change.up {
            color: #00ff88;
        }

        .chart-change.down {
            color: #ff4757;
        }

        .chart-canvas-container {
            position: relative;
            height: 200px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 15px;
            overflow: hidden;
        }

        .chart-canvas {
            width: 100%;
            height: 100%;
        }

        .chart-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .chart-grid-line {
            stroke: rgba(255, 255, 255, 0.1);
            stroke-width: 1;
        }

        .lang-switch {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 8px 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
            color: #fff;
        }

        .lang-switch:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .lang-switch:active {
            transform: scale(0.95);
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        .subtitle {
            font-size: 14px;
            color: #8b9dc3;
        }

        .stats-card {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            border-radius: 20px;
            padding: 25px;
            margin: 20px 0;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0;
        }

        .stat-label {
            font-size: 14px;
            color: #8b9dc3;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }

        .stat-value.up {
            color: #00ff88;
            animation: pulse-up 1s ease-in-out infinite;
        }

        .stat-value.down {
            color: #ff4757;
            animation: pulse-down 1s ease-in-out infinite;
        }

        @keyframes pulse-up {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes pulse-down {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(0.95); }
        }

        .data-stream {
            height: 60px;
            overflow: hidden;
            margin: 20px 0;
            position: relative;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }

        .stream-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 15px;
            font-size: 12px;
            animation: stream 3s linear infinite;
            opacity: 0.7;
        }

        @keyframes stream {
            0% { transform: translateY(60px); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(-60px); opacity: 0; }
        }

        .calculator-card {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            border-radius: 20px;
            padding: 25px;
            margin: 20px 0;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .calculator-title {
            font-size: 20px;
            margin-bottom: 20px;
            text-align: center;
            color: #fff;
        }

        .input-group {
            margin: 20px 0;
        }

        .input-label {
            display: block;
            font-size: 14px;
            color: #8b9dc3;
            margin-bottom: 10px;
        }

        .input-field {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        .days-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .day-btn {
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #8b9dc3;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .day-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .day-btn:hover {
            border-color: #667eea;
        }

        .rate-display {
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            text-align: center;
        }

        #rateValue {
            font-size: 24px;
            font-weight: bold;
            color: #00ff88;
            margin-right: 10px;
        }

        .rate-note {
            font-size: 12px;
            color: #8b9dc3;
        }

        .cta-button {
            width: 100%;
            padding: 18px;
            margin: 20px 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
            animation: button-glow 2s ease-in-out infinite;
        }

        @keyframes button-glow {
            0%, 100% { box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4); }
            50% { box-shadow: 0 10px 40px rgba(102, 126, 234, 0.6); }
        }

        .cta-button:active {
            transform: scale(0.98);
        }

        .result-card {
            margin-top: 20px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-item.total {
            margin-top: 10px;
            padding-top: 15px;
            border-top: 2px solid rgba(255, 255, 255, 0.1);
        }

        .result-label {
            font-size: 14px;
            color: #8b9dc3;
        }

        .result-value {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
        }

        .result-value.profit {
            color: #00ff88;
        }

        .result-value.monthly-rate {
            color: #64b5f6;
        }

        .result-item.total .result-value {
            font-size: 24px;
            color: #ffd700;
        }

        .features {
            margin: 30px 0;
        }

        .feature-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border-left: 3px solid #667eea;
            animation: slide-in 0.5s ease-out forwards;
            opacity: 0;
        }

        .feature-item:nth-child(1) { animation-delay: 0.1s; }
        .feature-item:nth-child(2) { animation-delay: 0.2s; }
        .feature-item:nth-child(3) { animation-delay: 0.3s; }

        @keyframes slide-in {
            from {
                transform: translateX(-20px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .feature-icon {
            font-size: 24px;
            margin-right: 15px;
        }

        .feature-text {
            font-size: 14px;
            color: #dfe6e9;
        }

        /* 客服联系区域 */
        .contact-section {
            margin: 20px 0;
            padding: 25px 20px;
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.1) 0%, rgba(0, 200, 100, 0.1) 100%);
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 136, 0.2);
            text-align: center;
        }

        .contact-header {
            margin-bottom: 25px;
        }

        .contact-title {
            font-size: 16px;
            color: #8b9dc3;
            margin-bottom: 8px;
        }

        .contact-subtitle {
            font-size: 20px;
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        .contact-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .contact-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .contact-btn:active {
            transform: scale(0.98);
        }

        .contact-btn.wechat {
            background: linear-gradient(135deg, #07c160 0%, #05a850 100%);
        }

        .contact-btn.wechat:hover {
            box-shadow: 0 8px 20px rgba(7, 193, 96, 0.4);
        }

        .contact-btn.whatsapp {
            background: linear-gradient(135deg, #25D366 0%, #1DA851 100%);
        }

        .contact-btn.whatsapp:hover {
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.4);
        }

        .contact-btn.line {
            background: linear-gradient(135deg, #00B900 0%, #009900 100%);
        }

        .contact-btn.line:hover {
            box-shadow: 0 8px 20px rgba(0, 185, 0, 0.4);
        }

        .btn-icon {
            font-size: 24px;
        }

        .btn-text {
            font-size: 16px;
        }

        .wave {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            z-index: 0;
            opacity: 0.1;
        }

        .wave path {
            animation: wave 8s linear infinite;
        }

        @keyframes wave {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="container">

            <div class="subtitle" data-zh="智能算法 · 稳定收益" data-en="Smart Algorithm · Stable Returns">智能算法 · 稳定收益</div>

                <p class="contact-subtitle" data-zh="AI 黄金量化交易托管免费体验名额" data-en="AI Gold Quantitative Trading Custody Free Trial">AI 黄金量化交易托管免费体验名额</p>
            </div>

            <div class="contact-buttons">

                </button>
            </div>
        </div>

        <div class="stats-card">
            <div class="stat-item">
                <span class="stat-label" data-zh="今日收益率" data-en="Today's Return">今日收益率</span>
                <span class="stat-value up" id="profit">+0.00%</span>
            </div>
            <div class="stat-item">
                <span class="stat-label" data-zh="累计收益" data-en="Total Earnings">累计收益</span>

            </div>
            <div class="stat-item">
                <span class="stat-label" data-zh="活跃策略" data-en="Active Strategies">活跃策略</span>
                <span class="stat-value" id="strategies" style="color: #64b5f6;">0</span>
            </div>
        </div>

        <div class="data-stream" id="dataStream"></div>

        <!-- 复利计算器 -->

            <div class="input-group">
                <label class="input-label" data-zh="投资金额 (美金或USDT) 起步$1000" data-en="Investment Amount (USD or USDT) Min $1000">投资金额 (美金或USDT) 起步$1000</label>
                <input type="number" id="investment" class="input-field" placeholder="请输入投资金额" value="10000">

                    <span class="result-label" data-zh="月化率（预估）" data-en="Monthly Rate (Est.)">月化率（预估）</span>

                <span class="feature-text" data-zh="实时数据分析，精准把握市场" data-en="Real-time Data Analysis, Precise Market Insights">实时数据分析，精准把握市场</span>
            </div>

                <span class="feature-icon">🔒</span>
                <span class="feature-text" data-zh="银行级安全保障，资金安全无忧" data-en="Bank-level Security, Funds Fully Protected">银行级安全保障，资金安全无忧</span>

    <script>
        let selectedDays = 30;
        let currentLang = 'zh'; // 默认中文

        // 语言切换功能
        function toggleLanguage() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            
            // 更新按钮文字
            document.getElementById('langText').textContent = currentLang === 'zh' ? 'EN' : '中文';
            
            // 更新所有带有 data-zh 和 data-en 属性的元素
            document.querySelectorAll('[data-zh][data-en]').forEach(element => {
                element.textContent = element.getAttribute('data-' + currentLang);
            });
            
            // 保存语言偏好
            localStorage.setItem('preferredLang', currentLang);
        }

        // 页面加载时恢复语言偏好
        function initLanguage() {
            const savedLang = localStorage.getItem('preferredLang');
            if (savedLang && savedLang !== currentLang) {
                toggleLanguage();
            }
        }

        // 统计功能
        function trackEvent(eventType, eventData) {
            const stats = JSON.parse(localStorage.getItem('siteStats') || '{"pageViews": 0, "buttonClicks": {}}');
            
            if (eventType === 'pageView') {
                stats.pageViews = (stats.pageViews || 0) + 1;
                stats.lastVisit = new Date().toISOString();
            } else if (eventType === 'buttonClick') {
                if (!stats.buttonClicks[eventData]) {
                    stats.buttonClicks[eventData] = 0;
                }
                stats.buttonClicks[eventData]++;
            }
            
            localStorage.setItem('siteStats', JSON.stringify(stats));
        }

        // 页面加载时记录访问
        trackEvent('pageView');

        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 3 + 's';
                particle.style.animationDuration = (Math.random() * 2 + 2) + 's';
                container.appendChild(particle);
            }
        }

        function updateStats() {
            const profit = document.getElementById('profit');
            const total = document.getElementById('total');
            const strategies = document.getElementById('strategies');

            setInterval(() => {
                const profitValue = (Math.random() * 5 - 1).toFixed(2);
                profit.textContent = (profitValue >= 0 ? '+' : '') + profitValue + '%';
                profit.className = 'stat-value ' + (profitValue >= 0 ? 'up' : 'down');

                const totalValue = (Math.random() * 50000 + 10000).toFixed(2);
                total.textContent = '$' + totalValue.toLocaleString();

                const strategyCount = Math.floor(Math.random() * 5 + 3);
                strategies.textContent = strategyCount;
            }, 2000);
        }

        function createDataStream() {
            const stream = document.getElementById('dataStream');
            const symbols = ['BTC/USDT', 'ETH/USDT', 'BNB/USDT', 'SOL/USDT', 'ADA/USDT'];
            
            setInterval(() => {
                const item = document.createElement('div');
                item.className = 'stream-item';
                const symbol = symbols[Math.floor(Math.random() * symbols.length)];
                const price = (Math.random() * 10000 + 1000).toFixed(2);
                const change = (Math.random() * 10 - 5).toFixed(2);
                const color = change >= 0 ? '#00ff88' : '#ff4757';
                
                item.innerHTML = `
                    <span>${symbol}</span>
                    <span style="color: ${color}">${change >= 0 ? '+' : ''}${change}%</span>
                `;
                
                stream.appendChild(item);
                
                setTimeout(() => {
                    item.remove();
                }, 3000);
            }, 1000);
        }

        function selectDays(days) {
            selectedDays = days;
            document.querySelectorAll('.day-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        function contactService(type) {
            trackEvent('buttonClick', 'contact_' + type);
            let message = '';
            switch(type) {
                case 'wechat':
                    message = '📱 请添加微信客服\n\n微信号：[请填写您的微信号]\n\n立即领取黄金量化交易托管免费体验名额！';
                    break;
                case 'whatsapp':
                    message = '📱 请添加 WhatsApp 客服\n\n号码：[请填写您的WhatsApp号码]\n\n立即领取黄金量化交易托管免费体验名额！';
                    break;
                case 'line':
                    message = '📱 请添加 LINE 客服\n\nLINE ID：[请填写您的LINE ID]\n\n立即领取黄金量化交易托管免费体验名额！';
                    break;
            }
            alert(message);
        }

        function calculateReturn() {
            trackEvent('buttonClick', 'calculate_return');
            const investment = parseFloat(document.getElementById('investment').value);
            
            if (!investment || investment <= 0) {
                alert('请输入有效的投资金额！');
                return;
            }

            // 根据投资金额自动分配月化率
            // 每1000元增加月化率
            let monthlyRate = 10; // 基础月化率10%
            const thousands = Math.floor(investment / 1000);
            
            if (thousands >= 1 && thousands < 5) {
                monthlyRate = 10; // 1000-4999: 10%
            } else if (thousands >= 5 && thousands < 10) {
                monthlyRate = 12; // 5000-9999: 12%
            } else if (thousands >= 10 && thousands < 20) {
                monthlyRate = 15; // 10000-19999: 15%
            } else if (thousands >= 20 && thousands < 50) {
                monthlyRate = 18; // 20000-49999: 18%
            } else if (thousands >= 50 && thousands < 100) {
                monthlyRate = 20; // 50000-99999: 20%
            } else if (thousands >= 100) {
                monthlyRate = 25; // 100000+: 25%
            }

            // 根据月化率和投资天数计算预期收益
            // 预期收益 = 本金 × 月化率 × (天数/30)
            const profitAmount = investment * (monthlyRate / 100) * (selectedDays / 30);
            const finalAmount = investment + profitAmount;

            // 显示结果
            document.getElementById('principal').textContent = '$' + investment.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('monthlyRate').textContent = monthlyRate.toFixed(0) + '%';
            document.getElementById('profitResult').textContent = '$' + profitAmount.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('totalResult').textContent = '$' + finalAmount.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            
            // 更新显示的日收益率（根据月化率反推）
            const dailyRate = (monthlyRate / 100) / 30;
            document.getElementById('rateValue').textContent = (dailyRate * 100).toFixed(2) + '%';

            // 显示结果卡片
            const resultCard = document.getElementById('resultCard');
            resultCard.style.display = 'block';
        }

        // 黄金走势图功能
        function initGoldChart() {
            const canvas = document.getElementById('goldChart');
            const ctx = canvas.getContext('2d');
            
            // 设置canvas尺寸
            function resizeCanvas() {
                const container = canvas.parentElement;
                canvas.width = container.clientWidth - 30;
                canvas.height = container.clientHeight - 30;
            }
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            // 生成初始价格数据（60个数据点，模拟1小时的数据）
            let priceData = [];
            let basePrice = 2048.50;
            
            for (let i = 0; i < 60; i++) {
                // 添加随机波动，创建真实的走势
                const change = (Math.random() - 0.48) * 3; // 略微向上的趋势
                basePrice += change;
                priceData.push(basePrice);
            }

            // 绘制图表
            function drawChart() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                if (priceData.length === 0) return;

                // 计算价格范围
                const maxPrice = Math.max(...priceData);
                const minPrice = Math.min(...priceData);
                const priceRange = maxPrice - minPrice;
                const padding = priceRange * 0.1; // 10% padding

                // 绘制网格线
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.lineWidth = 1;
                for (let i = 0; i < 5; i++) {
                    const y = (canvas.height / 4) * i;
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(canvas.width, y);
                    ctx.stroke();
                }

                // 绘制渐变填充区域
                const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                gradient.addColorStop(0, 'rgba(255, 215, 0, 0.3)');
                gradient.addColorStop(1, 'rgba(255, 215, 0, 0.0)');

                ctx.beginPath();
                ctx.moveTo(0, canvas.height);

                // 绘制价格线和填充
                priceData.forEach((price, index) => {
                    const x = (canvas.width / (priceData.length - 1)) * index;
                    const y = canvas.height - ((price - minPrice + padding) / (priceRange + padding * 2)) * canvas.height;
                    
                    if (index === 0) {
                        ctx.lineTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                });

                ctx.lineTo(canvas.width, canvas.height);
                ctx.closePath();
                ctx.fillStyle = gradient;
                ctx.fill();

                // 绘制价格线
                ctx.beginPath();
                priceData.forEach((price, index) => {
                    const x = (canvas.width / (priceData.length - 1)) * index;
                    const y = canvas.height - ((price - minPrice + padding) / (priceRange + padding * 2)) * canvas.height;
                    
                    if (index === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                });
                ctx.strokeStyle = '#ffd700';
                ctx.lineWidth = 2;
                ctx.stroke();

                // 绘制最后一个点
                const lastPrice = priceData[priceData.length - 1];
                const lastX = canvas.width;
                const lastY = canvas.height - ((lastPrice - minPrice + padding) / (priceRange + padding * 2)) * canvas.height;
                
                ctx.beginPath();
                ctx.arc(lastX, lastY, 4, 0, Math.PI * 2);
                ctx.fillStyle = '#ffd700';
                ctx.fill();
                ctx.strokeStyle = 'rgba(255, 215, 0, 0.5)';
                ctx.lineWidth = 8;
                ctx.stroke();
            }

            // 更新价格数据
            function updatePrice() {
                // 移除最旧的数据点
                if (priceData.length >= 60) {
                    priceData.shift();
                }

                // 添加新的价格点（带有随机波动）
                const lastPrice = priceData[priceData.length - 1];
                const change = (Math.random() - 0.48) * 2;
                const newPrice = lastPrice + change;
                priceData.push(newPrice);

                // 更新显示的价格
                const currentPrice = newPrice;
                const startPrice = priceData[0];
                const priceChange = currentPrice - startPrice;
                const percentChange = (priceChange / startPrice) * 100;

                document.getElementById('goldPrice').textContent = '$' + currentPrice.toFixed(2);
                
                const changeElement = document.getElementById('goldChange');
                const changeText = (priceChange >= 0 ? '+' : '') + priceChange.toFixed(2) + 
                                  ' (' + (priceChange >= 0 ? '+' : '') + percentChange.toFixed(2) + '%)';
                changeElement.textContent = changeText;
                changeElement.className = 'chart-change ' + (priceChange >= 0 ? 'up' : 'down');

                // 重绘图表
                drawChart();
            }

            // 初始绘制
            drawChart();

            // 每2秒更新一次价格
            setInterval(updatePrice, 2000);
        }

        createParticles();
        updateStats();
        createDataStream();
        initLanguage(); // 初始化语言
        initGoldChart(); // 初始化黄金走势图
    </script>
